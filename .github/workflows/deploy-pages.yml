name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build for GitHub Pages
        run: npm run build:pages
        env:
          GITHUB_PAGES: 'true'
          VITE_WALLETCONNECT_PROJECT_ID: ${{ secrets.VITE_WALLETCONNECT_PROJECT_ID }}
          VITE_SOLANA_RPC_URL: ${{ secrets.VITE_SOLANA_RPC_URL }}
          VITE_SOLANA_DEVNET_RPC_URL: ${{ secrets.VITE_SOLANA_DEVNET_RPC_URL }}
          VITE_SOLANA_MAINNET_RPC_URL: ${{ secrets.VITE_SOLANA_MAINNET_RPC_URL }}
          VITE_SOLANA_TESTNET_RPC_URL: ${{ secrets.VITE_SOLANA_TESTNET_RPC_URL }}
          VITE_GRAI_SOLANA_CLUSTER: ${{ vars.VITE_GRAI_SOLANA_CLUSTER || 'devnet' }}
          VITE_GRAI_RPC_URL: ${{ secrets.VITE_GRAI_RPC_URL }}
          VITE_GRAI_DEVNET_RPC_URL: ${{ secrets.VITE_GRAI_DEVNET_RPC_URL }}
          VITE_GRAI_MAINNET_RPC_URL: ${{ secrets.VITE_GRAI_MAINNET_RPC_URL }}
          VITE_GRAI_TESTNET_RPC_URL: ${{ secrets.VITE_GRAI_TESTNET_RPC_URL }}
          VITE_GRAI_MINT: ${{ secrets.VITE_GRAI_MINT }}
          VITE_GRAI_DEVNET_MINT: ${{ secrets.VITE_GRAI_DEVNET_MINT }}
          VITE_GRAI_MAINNET_MINT: ${{ secrets.VITE_GRAI_MAINNET_MINT }}
          VITE_GRAI_TESTNET_MINT: ${{ secrets.VITE_GRAI_TESTNET_MINT }}
          VITE_GRAI_ETHEREUM_TOKEN: ${{ secrets.VITE_GRAI_ETHEREUM_TOKEN }}
          VITE_GRAI_ETHEREUM_PROTOCOL: ${{ secrets.VITE_GRAI_ETHEREUM_PROTOCOL }}
          VITE_GRAI_BASE_TOKEN: ${{ secrets.VITE_GRAI_BASE_TOKEN }}
          VITE_GRAI_BASE_PROTOCOL: ${{ secrets.VITE_GRAI_BASE_PROTOCOL }}
          VITE_GRAI_ARBITRUM_TOKEN: ${{ secrets.VITE_GRAI_ARBITRUM_TOKEN }}
          VITE_GRAI_ARBITRUM_PROTOCOL: ${{ secrets.VITE_GRAI_ARBITRUM_PROTOCOL }}
          VITE_GRAI_SEPOLIA_TOKEN: ${{ secrets.VITE_GRAI_SEPOLIA_TOKEN }}
          VITE_GRAI_SEPOLIA_PROTOCOL: ${{ secrets.VITE_GRAI_SEPOLIA_PROTOCOL }}
          VITE_GRAI_BASE_SEPOLIA_TOKEN: ${{ secrets.VITE_GRAI_BASE_SEPOLIA_TOKEN }}
          VITE_GRAI_BASE_SEPOLIA_PROTOCOL: ${{ secrets.VITE_GRAI_BASE_SEPOLIA_PROTOCOL }}
          VITE_BACKTEST_API_URL: ${{ secrets.VITE_BACKTEST_API_URL }}
          VITE_MAIN_APP_URL: ${{ vars.VITE_MAIN_APP_URL }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
